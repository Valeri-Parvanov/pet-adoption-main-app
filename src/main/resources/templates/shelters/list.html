<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shelters - Pet Adoption</title>
</head>
<body>
<h1>Shelters</h1>

<p><a th:href="@{/shelters/new}">Register a new shelter</a></p>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="shelter : ${shelters}">
            <td th:text="${shelter.name}"></td>
            <td th:text="${shelter.address}"></td>
            <td th:text="${shelter.phone}"></td>
            <td th:text="${shelter.email}"></td>
            <td>
                <a th:href="@{/shelters/{id}/edit(id=${shelter.id})}">Edit</a>
                <form th:action="@{/shelters/{id}/delete(id=${shelter.id})}" method="post" style="display:inline;">
                    <button type="submit" onclick="return confirm('Delete this shelter?')">Delete</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<p><a th:href="@{/}">Back to home</a></p>
</body>
</html>
