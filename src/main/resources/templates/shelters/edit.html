<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Shelter - Pet Adoption</title>
</head>
<body>
<h1>Edit shelter</h1>

<form th:action="@{/shelters/{id}(id=${shelterId})}" th:object="${shelterRequest}" method="post">
    <div>
        <label>Name</label>
        <input type="text" th:field="*{name}" />
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></p>
    </div>
    <div>
        <label>Address</label>
        <input type="text" th:field="*{address}" />
        <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color:red;"></p>
    </div>
    <div>
        <label>Phone</label>
        <input type="text" th:field="*{phone}" />
        <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color:red;"></p>
    </div>
    <div>
        <label>Email</label>
        <input type="text" th:field="*{email}" />
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></p>
    </div>
    <button type="submit">Save changes</button>
</form>

<p><a th:href="@{/shelters}">Back to shelters</a></p>
</body>
</html>
