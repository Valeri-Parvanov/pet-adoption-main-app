<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f5;
            text-align: center;
            padding-top: 80px;
        }
        h1 {
            color: #2e7d32;
        }
        a {
            color: #2e7d32;
        }
    </style>
</head>
<body>
<h1>Welcome to the Pet Adoption Platform</h1>
<p>Find your new best friend.</p>
<p>
    <a th:href="@{/pets}">Browse pets</a> |
    <a th:href="@{/shelters}">Shelters</a> |
    <a th:href="@{/requests/my}">My requests</a> |
    <a th:href="@{/requests/incoming}">Incoming requests</a>
</p>
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>
</body>
</html>
