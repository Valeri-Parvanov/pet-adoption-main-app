<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Pet Adoption</title>
</head>
<body>
<h1>Login</h1>

<p th:if="${param.registered}" style="color:green;">Registration successful. Please log in.</p>
<p th:if="${param.error}" style="color:red;">Invalid email or password.</p>
<p th:if="${param.logout}" style="color:green;">You have been logged out.</p>

<form th:action="@{/login}" method="post">
    <div>
        <label>Email</label>
        <input type="text" name="username" />
    </div>
    <div>
        <label>Password</label>
        <input type="password" name="password" />
    </div>
    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a th:href="@{/register}">Register</a></p>
</body>
</html>
