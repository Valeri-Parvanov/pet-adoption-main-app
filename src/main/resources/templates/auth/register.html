<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Pet Adoption</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f5;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }
        .register-card {
            background: #ffffff;
            padding: 32px 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 360px;
        }
        .register-card h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .error-text {
            color: #c62828;
            font-size: 0.85em;
        }
        .alert-error {
            color: #c62828;
            background-color: #fdecea;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background-color: #256428;
        }
        .login-link {
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h1>Create Account</h1>

    <p class="alert-error" th:if="${registerError}" th:text="${registerError}"></p>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="text" th:field="*{email}" />
            <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" />
            <span class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}" />
            <span class="error-text" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
        </div>
        <div class="form-group">
            <label>First name</label>
            <input type="text" th:field="*{firstName}" />
            <span class="error-text" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
        </div>
        <div class="form-group">
            <label>Last name</label>
            <input type="text" th:field="*{lastName}" />
            <span class="error-text" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
        </div>
        <button type="submit">Register</button>
    </form>

    <p class="login-link">Already have an account? <a th:href="@{/login}">Login</a></p>
</div>
</body>
</html>
