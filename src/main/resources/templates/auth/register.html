<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Pet Adoption</title>
</head>
<body>
<h1>Register</h1>

<p th:if="${registerError}" th:text="${registerError}" style="color:red;"></p>

<form th:action="@{/register}" th:object="${registerRequest}" method="post">
    <div>
        <label>Email</label>
        <input type="text" th:field="*{email}" />
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></span>
    </div>
    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" />
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></span>
    </div>
    <div>
        <label>First name</label>
        <input type="text" th:field="*{firstName}" />
        <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color:red;"></span>
    </div>
    <div>
        <label>Last name</label>
        <input type="text" th:field="*{lastName}" />
        <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red;"></span>
    </div>
    <button type="submit">Register</button>
</form>

<p>Already have an account? <a th:href="@{/login}">Login</a></p>
</body>
</html>
